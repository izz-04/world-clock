<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Clock Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #212529;
        }
        body {
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        .clock-card {
            background: var(--card-bg);
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            transition: transform 0.2s ease;
        }
        .clock-card:hover {
            transform: translateY(-5px);
        }
        .time-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2.5rem;
            font-weight: 500;
            letter-spacing: -1px;
        }
        .city-name { font-weight: 600; font-size: 1.2rem; }
        .date-display { color: #6c757d; font-size: 0.9rem; }
        .btn-remove { 
            position: absolute; top: 10px; right: 10px; 
            opacity: 0; transition: opacity 0.2s;
        }
        .clock-card:hover .btn-remove { opacity: 1; }
        .search-container { max-width: 600px; margin: 0 auto 3rem auto; }
    </style>
</head>
<body>

<div class="container py-5">
    <!-- Header -->
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold">World Clock</h1>
        <p class="text-muted">Stay in sync with the world.</p>
    </div>

    <!-- Search/Add Section -->
    <div class="search-container">
        <div class="input-group mb-3 shadow-sm rounded-pill overflow-hidden">
            <input type="text" id="citySearch" class="form-control border-0 py-3 ps-4" placeholder="Search a city (e.g. London, Tokyo...)" list="timezoneOptions">
            <button class="btn btn-primary px-4" type="button" id="addBtn">Add Clock</button>
        </div>
        <datalist id="timezoneOptions"></datalist>
    </div>

    <!-- Clocks Grid -->
    <div class="row g-4" id="clockGrid">
        <!-- Clocks will be injected here -->
    </div>
</div>

<!-- Luxon Library -->
<script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>

<script>
    const DateTime = luxon.DateTime;

    // --- CONFIGURATION ---
    // Change these to set your initial default view
    const DEFAULT_ZONES = [
        { name: "Local Time", zone: "system" },
        { name: "London", zone: "Europe/London" },
        { name: "New York", zone: "America/New_York" },
        { name: "Tokyo", zone: "Asia/Tokyo" }
    ];

    // Common IANA timezones for the search suggestions
    const COMMON_ZONES = [
        "America/New_York", "America/Los_Angeles", "America/Chicago", "Europe/London", 
        "Europe/Paris", "Europe/Berlin", "Asia/Tokyo", "Asia/Hong_Kong", "Asia/Singapore", 
        "Australia/Sydney", "Pacific/Auckland", "Asia/Kolkata", "Asia/Dubai"
    ];

    let userZones = JSON.parse(localStorage.getItem('worldClock_zones')) || DEFAULT_ZONES;

    function init() {
        // Populate search suggestions
        const datalist = document.getElementById('timezoneOptions');
        COMMON_ZONES.forEach(tz => {
            const opt = document.createElement('option');
            opt.value = tz;
            datalist.appendChild(opt);
        });

        renderClocks();
        setInterval(updateTimes, 1000);
    }

    function renderClocks() {
        const grid = document.getElementById('clockGrid');
        grid.innerHTML = '';
        
        userZones.forEach((item, index) => {
            const col = document.createElement('div');
            col.className = 'col-12 col-md-6 col-lg-4';
            col.innerHTML = `
                <div class="card clock-card p-4 position-relative" data-zone="${item.zone}">
                    <button class="btn btn-sm btn-outline-danger btn-remove border-0" onclick="removeClock(${index})">✕</button>
                    <div class="city-name">${item.name}</div>
                    <div class="date-display mb-2" id="date-${index}">--</div>
                    <div class="time-display" id="time-${index}">00:00:00</div>
                    <div class="text-muted small">${item.zone === 'system' ? 'Local' : item.zone}</div>
                </div>
            `;
            grid.appendChild(col);
        });
        updateTimes();
    }

    function updateTimes() {
        userZones.forEach((item, index) => {
            const now = DateTime.now().setZone(item.zone);
            const timeEl = document.getElementById(`time-${index}`);
            const dateEl = document.getElementById(`date-${index}`);
            
            if (timeEl) timeEl.innerText = now.toFormat('HH:mm:ss');
            if (dateEl) dateEl.innerText = now.toFormat('cccc, LLL dd');
        });
    }

    function removeClock(index) {
        userZones.splice(index, 1);
        saveAndRefresh();
    }

    document.getElementById('addBtn').addEventListener('click', () => {
        const input = document.getElementById('citySearch');
        const val = input.value.trim();
        if (!val) return;

        // Try to determine a name from the timezone string (e.g., "Asia/Tokyo" -> "Tokyo")
        const name = val.includes('/') ? val.split('/').pop().replace('_', ' ') : val;
        
        userZones.push({ name: name, zone: val });
        input.value = '';
        saveAndRefresh();
    });

    function saveAndRefresh() {
        localStorage.setItem('worldClock_zones', JSON.stringify(userZones));
        renderClocks();
    }

    init();
</script>
</body>
</html>
