<!DOCTYPE html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern World Clock</title>

    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌍</text></svg>">
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Inter', sans-serif; transition: background 0.3s ease; }
        .clock-card { border-radius: 20px; border: none; box-shadow: 0 10px 30px rgba(0,0,0,0.08); transition: all 0.3s ease; }
        [data-bs-theme="dark"] .clock-card { box-shadow: 0 10px 30px rgba(0,0,0,0.4); }
        
        .time-12h { font-family: 'JetBrains Mono', monospace; font-size: 2.2rem; font-weight: 600; line-height: 1; }
        .ampm { font-size: 1rem; color: #6c757d; margin-left: 5px; text-transform: uppercase; }
        .time-24h { font-family: 'JetBrains Mono', monospace; font-size: 0.9rem; opacity: 0.7; }
        
        .btn-remove { position: absolute; top: 15px; right: 15px; opacity: 0; }
        .clock-card:hover .btn-remove { opacity: 1; }
        .search-container { max-width: 500px; margin: 0 auto 2rem; }
    </style>
</head>
<body class="bg-body-tertiary">

<div class="container py-5">
    <!-- Top Bar -->
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="fw-bold m-0">World Clock</h2>
        <button class="btn btn-outline-secondary rounded-pill" id="themeToggle">🌓 Toggle Dark Mode</button>
    </div>

    <!-- Search -->
    <div class="search-container">
        <div class="input-group shadow-sm rounded-pill overflow-hidden">
            <input type="text" id="citySearch" class="form-control border-0 p-3" placeholder="Add timezone (e.g. Asia/Karachi)" list="tzList">
            <button class="btn btn-primary px-4" id="addBtn">Add</button>
        </div>
        <datalist id="tzList"></datalist>
    </div>

    <!-- Grid -->
    <div class="row g-4" id="clockGrid"></div>
</div>

<!-- Luxon Library -->
<script src="https://cdn.jsdelivr.net/npm/luxon@3.3.0/build/global/luxon.min.js"></script>

<script>
    const DateTime = luxon.DateTime;

    // --- 1. WHERE TO EDIT DEFAULTS ---
    const DEFAULT_ZONES = [
        { name: "Local Time", zone: "system" },
        { name: "Pakistan", zone: "Asia/Karachi" },
        { name: "India", zone: "Asia/Kolkata" },
        { name: "Canada (Toronto)", zone: "America/Toronto" },
        { name: "UTC / Zulu", zone: "UTC" }
    ];

    let userZones = JSON.parse(localStorage.getItem('worldClock_v2')) || DEFAULT_ZONES;

    // Initialize
    function init() {
        renderClocks();
        setInterval(updateTimes, 1000);
        setupTheme();
    }

    function renderClocks() {
        const grid = document.getElementById('clockGrid');
        grid.innerHTML = '';
        userZones.forEach((item, index) => {
            grid.innerHTML += `
                <div class="col-12 col-md-6 col-lg-4">
                    <div class="card clock-card p-4 h-100 bg-body">
                        <button class="btn btn-sm btn-link text-danger btn-remove" onclick="removeClock(${index})">✕</button>
                        <div class="small text-uppercase fw-bold text-primary mb-1">${item.name}</div>
                        <div class="text-muted small mb-3" id="date-${index}">--</div>
                        
                        <div class="d-flex align-items-baseline">
                            <div class="time-12h" id="time12-${index}">00:00:00</div>
                            <div class="ampm" id="ampm-${index}">AM</div>
                        </div>
                        
                        <div class="mt-2 border-top pt-2">
                            <span class="text-muted small">24H:</span>
                            <span class="time-24h" id="time24-${index}">00:00:00</span>
                        </div>
                    </div>
                </div>
            `;
        });
        updateTimes();
    }

    function updateTimes() {
        userZones.forEach((item, index) => {
            const now = DateTime.now().setZone(item.zone);
            
            // 12 Hour Format
            document.getElementById(`time12-${index}`).innerText = now.toFormat('hh:mm:ss');
            document.getElementById(`ampm-${index}`).innerText = now.toFormat('a');
            
            // 24 Hour Format
            document.getElementById(`time24-${index}`).innerText = now.toFormat('HH:mm:ss');
            
            // Date Format
            document.getElementById(`date-${index}`).innerText = now.toFormat('DDDD');
        });
    }

    // --- HELPER FUNCTIONS ---

    function removeClock(index) {
        userZones.splice(index, 1);
        save();
    }

    document.getElementById('addBtn').addEventListener('click', () => {
        const val = document.getElementById('citySearch').value.trim();
        if(!val) return;
        const name = val.includes('/') ? val.split('/').pop().replace('_', ' ') : val;
        userZones.push({ name: name, zone: val });
        document.getElementById('citySearch').value = '';
        save();
    });

    function save() {
        localStorage.setItem('worldClock_v2', JSON.stringify(userZones));
        renderClocks();
    }

    // Dark Mode Logic
    function setupTheme() {
        const btn = document.getElementById('themeToggle');
        const html = document.documentElement;
        
        // Load saved preference
        const savedTheme = localStorage.getItem('theme') || 'light';
        html.setAttribute('data-bs-theme', savedTheme);

        btn.addEventListener('click', () => {
            const current = html.getAttribute('data-bs-theme');
            const target = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-bs-theme', target);
            localStorage.setItem('theme', target);
        });
    }

    init();
</script>
</body>
</html>
